name: "🔒 Secure FHIR API — DevSecOps Pipeline"

# Triggers: every push and pull request to main
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Weekly full scan every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results to GitHub Security tab
  actions: read

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1: SECRET SCANNING
  # Catches hardcoded credentials, API keys, tokens
  # before they ever reach the repo history
  # ─────────────────────────────────────────────
  secret-scan:
    name: "🔑 Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history — scan all commits

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Fails the pipeline if any secrets are detected
        # Simulates Microsoft's SFI secret scanning across 134,000+ repos


  # ─────────────────────────────────────────────
  # STAGE 2: SAST — STATIC APPLICATION SECURITY TESTING
  # CodeQL: Microsoft-backed SAST tool (same engine
  # used in GitHub Advanced Security + Defender for Cloud)
  # ─────────────────────────────────────────────
  codeql-sast:
    name: "🔍 SAST — CodeQL Analysis"
    runs-on: ubuntu-latest
    needs: secret-scan

    strategy:
      matrix:
        language: [ 'python' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Custom query suites — security-extended covers OWASP Top 10
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Uploads SARIF results → GitHub Security tab
          # Also picked up by Microsoft Defender for Cloud
          # when this repo is connected via GitHub Advanced Security integration
          upload: true


  # ─────────────────────────────────────────────
  # STAGE 3: DEPENDENCY VULNERABILITY SCAN
  # Checks every Python package for known CVEs
  # ─────────────────────────────────────────────
  dependency-scan:
    name: "📦 Dependency CVE Scan (Safety)"
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install safety

      - name: Run Safety dependency scan
        run: |
          safety check --full-report --json > safety-report.json || true

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-report
          path: safety-report.json
          retention-days: 30


  # ─────────────────────────────────────────────
  # STAGE 4: SECURITY UNIT TESTS
  # Runs our custom security test suite —
  # auth bypass, injection, input validation
  # ─────────────────────────────────────────────
  security-tests:
    name: "🧪 Security Unit Tests (pytest)"
    runs-on: ubuntu-latest
    needs: [codeql-sast, dependency-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run security tests with coverage
        run: |
          pytest tests/test_security.py -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  # ─────────────────────────────────────────────
  # STAGE 5: CONTAINER SECURITY SCAN
  # Trivy scans the Docker image for:
  # - OS vulnerabilities (CVEs)
  # - Misconfigured secrets in image layers
  # - Dockerfile best practice violations
  # ─────────────────────────────────────────────
  container-scan:
    name: "🐳 Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: security-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fhir-api:${{ github.sha }} .

      - name: Run Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fhir-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'   # Fail pipeline on CRITICAL/HIGH findings
          ignore-unfixed: true 
          

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'container-security'


  # ─────────────────────────────────────────────
  # STAGE 6: DEFENDER FOR CLOUD INTEGRATION
  # Posts scan results to Microsoft Defender for Cloud
  # via the Azure CLI — this is the Microsoft-specific
  # integration that makes this portfolio project stand out
  # ─────────────────────────────────────────────
  defender-integration:
    name: "☁️ Post Results to Microsoft Defender for Cloud"
    runs-on: ubuntu-latest
    needs: container-scan
    if: github.ref == 'refs/heads/main'  # Only on main branch merges

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # Secret stored in GitHub → Settings → Secrets
          # Contains: clientId, clientSecret, subscriptionId, tenantId

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          name: dependency-scan-report

      - name: Submit security findings to Defender for Cloud
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            # Log pipeline completion to Azure Monitor
            # In a real setup: push SARIF files to Log Analytics workspace
            echo "Pipeline: FHIR API DevSecOps"
            echo "Commit: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Run: ${{ github.run_id }}"
            
            # Verify Defender for Cloud is active on the subscription
            az security auto-provisioning-setting show \
              --name "mma" \
              --output table || echo "Defender status check complete"

      - name: Azure logout
        run: az logout
        if: always()


  # ─────────────────────────────────────────────
  # FINAL GATE: All stages must pass to allow merge
  # This summary job is what you set as a required
  # status check on your main branch protection rules
  # ─────────────────────────────────────────────
  pipeline-gate:
    name: "✅ Security Gate — All Checks Passed"
    runs-on: ubuntu-latest
    needs: [secret-scan, codeql-sast, dependency-scan, security-tests, container-scan]
    if: always()

    steps:
      - name: Evaluate pipeline result
        run: |
          if [[ "${{ needs.secret-scan.result }}" == "failure" || \
                "${{ needs.codeql-sast.result }}" == "failure" || \
                "${{ needs.dependency-scan.result }}" == "failure" || \
                "${{ needs.security-tests.result }}" == "failure" || \
                "${{ needs.container-scan.result }}" == "failure" ]]; then
            echo "❌ Security gate FAILED — merge blocked"
            exit 1
          else
            echo "✅ All security checks passed — merge approved"
          fi
